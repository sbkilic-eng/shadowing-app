<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Shadowing Ultra Pro v4.9</title>
<style>
  :root {
    --bg:#0a0c12; --panel:#13161f; --panel2:#1a1e2a;
    --accent:#5b8dee; --accent2:#a78bfa;
    --green:#34d399; --red:#f87171; --orange:#fb923c;
    --text:#e2e8f0; --dim:#64748b; --border:#1e2130; --radius:16px;
    --a-color:#5b8dee; --b-color:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  
  /* Ekran yüksekliğini sabitleyip kaymayı engeller */
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

  header{padding:54px 20px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
  header h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
  header h1 span{color:var(--accent)}

  .tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
  .tab{flex:1;padding:12px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .page{display:none;flex-direction:column;flex:1;overflow-y:auto;padding-bottom:40px}
  .page.active{display:flex}

  /* Oynatıcı: Sabit üst panel */
  #player-page { overflow: hidden; display: none; flex-direction: column; height: 100%; }
  #player-page.active { display: flex; }
  .player-fixed-section { flex-shrink: 0; background: var(--bg); padding-top: 10px; border-bottom: 1px solid var(--border); z-index: 10; }

  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);margin:12px 16px 0;padding:16px}
  .card-title{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--accent2);margin-bottom:10px}

  textarea{width:100%;min-height:140px;background:var(--panel2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;padding:12px;outline:none;resize:none}
  .file-row{display:flex;gap:8px;margin-top:10px}
  .file-btn{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:center}

  /* 1/4 Oranlı Çeviri Bölmesi */
  .player-main-area { display: flex; gap: 10px; padding: 15px 16px; min-height: 160px; align-items: stretch; }
  .sentence-box { flex: 3; display: flex; align-items: center; justify-content: center; background: var(--panel2); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
  .meaning-box-mini { flex: 1; display: none; align-items: center; justify-content: center; background: rgba(167, 139, 250, 0.08); border-radius: 12px; padding: 10px; border: 1px dashed var(--accent2); font-size: 13px; color: var(--accent2); text-align: center; overflow-wrap: break-word;}

  .player-sentence{font-size:22px; font-weight:600; text-align:center; line-height:1.4}
  .player-sentence.shadowing{color:var(--green)}
  .player-sentence.listening{color:var(--dim); font-style:italic}

  .media-controls{display:flex; justify-content:center; align-items:center; gap:12px; margin-bottom:15px}
  .mc-btn{width:46px; height:46px; border-radius:50%; border:none; background:var(--panel2); color:white; cursor:pointer; font-size:18px}
  .mc-btn.lg{width:65px; height:65px; background:var(--accent); font-size:24px}
  .mc-btn.tool{background: transparent; border: 1px solid var(--border); color: var(--dim); font-size: 14px; width: 38px; height: 38px;}

  /* Çeviri Switch */
  .switch-row { display: flex; justify-content: flex-end; padding: 0 20px; align-items: center; gap: 8px; margin-top: 5px;}
  .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .4s; border-radius: 18px; }
  .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--accent2); }
  input:checked + .slider:before { transform: translateX(16px); }

  .status-pill{padding:8px 16px; border-radius:20px; font-weight:700; font-size:12px; margin:0 auto 5px; display:inline-flex; align-items:center; gap:8px}
  .status-speaking{background:rgba(91,141,238,0.15); color:var(--accent)}
  .status-repeat{background:rgba(52,211,153,0.15); color:var(--green)}

  .progress-bar{height:4px; background:var(--border); width:90%; margin:0 auto 10px; border-radius:2px; overflow:hidden}
  .progress-fill{height:100%; background:var(--accent); width:0%; transition:0.3s}

  /* Kaydırılabilir Liste Alanı */
  .list-scroll-area { flex: 1; overflow-y: auto; padding: 10px 16px 120px; }
  .sent-item{padding:12px; background:var(--panel2); border-radius:10px; border:1px solid var(--border); font-size:13px; color:var(--dim); cursor:pointer; margin-bottom:8px}
  .sent-item.active{border-color:var(--accent); color:var(--text); background:rgba(91,141,238,0.1)}

  #voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 160px; overflow-y: auto; padding: 5px; margin-bottom: 15px;}
  .v-btn{padding:10px; background:var(--panel2); border:1px solid var(--border); border-radius:8px; color:var(--dim); font-size:11px; text-align:center; cursor:pointer; position: relative;}
  .v-btn.active{border-color:var(--accent); color:var(--accent); font-weight:bold}
  .lang-tag{position: absolute; top: 2px; right: 4px; font-size: 8px; opacity: 0.7;}

  .setting-row{display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px; align-items:center}
  input[type=range]{width:100%; margin-bottom:15px; accent-color:var(--accent)}
</style>
</head>
<body>

<header>
  <h1>🎧 <span>Ultra</span> Shadowing</h1>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('text')">📝 Metin</div>
  <div class="tab" onclick="showTab('dialog')">💬 Diyalog</div>
  <div class="tab" onclick="showTab('player')">▶️ Oynat</div>
  <div class="tab" onclick="showTab('settings')">⚙️ Ayarlar</div>
</div>

<div id="text-page" class="page active">
  <div class="card">
    <div class="card-title">Normal Metin (İngilizce | Türkçe)</div>
    <textarea id="main-text" placeholder="I am learning English. | İngilizce öğreniyorum."></textarea>
    <div class="file-row">
      <div class="file-btn" onclick="document.getElementById('file-norm').click()">📂 Dosya Yükle</div>
      <input type="file" id="file-norm" hidden onchange="loadFile(this, 'main-text')">
    </div>
    <button onclick="initApp('normal')" style="width:calc(100% - 32px); margin:15px 16px; padding:18px; border-radius:14px; border:none; font-weight:700; cursor:pointer; background:var(--accent); color:white">Başlat ▶</button>
  </div>
</div>

<div id="dialog-page" class="page">
  <div class="card">
    <div class="card-title">Diyalog Modu</div>
    <textarea id="dialog-text" placeholder="A: Hello | Selam&#10;B: Hi | Merhaba"></textarea>
    <div class="file-row">
      <div class="file-btn" onclick="document.getElementById('file-diag').click()">📂 Dosya Yükle</div>
      <input type="file" id="file-diag" hidden onchange="loadFile(this, 'dialog-text')">
    </div>
    <div style="display:flex; gap:10px; margin-top:15px">
      <button class="v-btn active" id="role-a" style="flex:1" onclick="setRole('A')">SİZ: A</button>
      <button class="v-btn" id="role-b" style="flex:1" onclick="setRole('B')">SİZ: B</button>
    </div>
    <button onclick="initApp('dialog')" style="width:calc(100% - 32px); margin:15px 16px; padding:18px; border-radius:14px; border:none; font-weight:700; cursor:pointer; background:var(--green); color:black">Diyaloğu Başlat ▶</button>
  </div>
</div>

<div id="player-page" class="page">
  <div class="player-fixed-section">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    
    <div class="switch-row">
      <span style="font-size: 10px; color: var(--dim)">ÇEVİRİ PENCERESİ</span>
      <label class="switch">
        <input type="checkbox" id="trans-toggle" onchange="toggleTransView(this.checked)">
        <span class="slider"></span>
      </label>
    </div>

    <div style="text-align:center; margin-top:5px">
      <div id="status-box" class="status-pill status-speaking">🔊 Hazır</div>
    </div>

    <div class="player-main-area">
      <div class="sentence-box">
        <div id="display-text" class="player-sentence">Başlatın...</div>
      </div>
      <div id="meaning-box" class="meaning-box-mini"></div>
    </div>

    <div id="timer-display" style="text-align:center; font-size:32px; font-weight:800; color:var(--green); height:40px"></div>

    <div class="media-controls">
      <button class="mc-btn tool" onclick="restartFromZero()" title="Başa Dön">⏮</button>
      <button class="mc-btn" onclick="changeSentence(-1)">⏪</button>
      <button class="mc-btn lg" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="mc-btn" onclick="changeSentence(1)">⏩</button>
      <button class="mc-btn tool" onclick="replayCurrent()" title="Tekrar Oynat">🔄</button>
    </div>
  </div>

  <div class="list-scroll-area">
    <div class="card-title">Cümle Akışı</div>
    <div id="list-container"></div>
  </div>
</div>

<div id="settings-page" class="page">
  <div class="card">
    <div class="card-title">Ses Motoru (US & UK)</div>
    <div id="voice-grid"></div>
    <div class="setting-row"><span>Okuma Hızı:</span> <span id="rate-label">1.0x</span></div>
    <input type="range" min="0.5" max="1.5" step="0.1" value="1" oninput="rate=this.value; document.getElementById('rate-label').innerText=this.value+'x'">
  </div>

  <div class="card">
    <div class="card-title">Shadowing & Süre</div>
    <div class="setting-row"><span>Cümle Tekrarı:</span> <span id="rep-label">1 Kez</span></div>
    <input type="range" min="1" max="5" step="1" value="1" oninput="repeatCount=this.value; document.getElementById('rep-label').innerText=this.value+' Kez'">

    <div style="display:flex; gap:8px; margin:10px 0">
      <button class="v-btn active" id="mode-dyn" style="flex:1" onclick="setPauseMode(true)">Dinamik</button>
      <button class="v-btn" id="mode-stat" style="flex:1" onclick="setPauseMode(false)">Manuel</button>
    </div>

    <div id="dyn-set">
      <div class="setting-row"><span>Kelime Başına Sn:</span> <span id="dyn-label">0.7s</span></div>
      <input type="range" min="0.3" max="1.5" step="0.1" value="0.7" oninput="dynMultiplier=this.value; document.getElementById('dyn-label').innerText=this.value+'s'">
    </div>
    <div id="stat-set" style="display:none">
      <div class="setting-row"><span>Sabit Bekleme:</span> <span id="stat-label">3.0s</span></div>
      <input type="range" min="0" max="15" step="0.5" value="3" oninput="staticPause=this.value; document.getElementById('stat-label').innerText=this.value+'s'">
    </div>
  </div>
</div>

<script>
let sentences = [], currentIdx = 0, isPlaying = false;
let myRole = 'A', rate = 1, repeatCount = 1, selectedVoiceName = '';
let isDynamic = true, dynMultiplier = 0.7, staticPause = 3;
let wakeLock = null;

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch (err) { console.log("WakeLock kısıtlandı."); }
}

function loadVoices() {
  let voices = window.speechSynthesis.getVoices();
  const grid = document.getElementById('voice-grid');
  if(!grid) return; grid.innerHTML = '';
  
  let filtered = voices.filter(v => {
    const l = v.lang.toLowerCase();
    return l.includes('en-us') || l.includes('en-gb');
  }).sort((a,b) => {
    const aL = a.name.toLowerCase(), bL = b.name.toLowerCase();
    const aH = aL.includes('premium') || aL.includes('enhanced') || aL.includes('siri') || aL.includes('online');
    const bH = bL.includes('premium') || bL.includes('enhanced') || bL.includes('siri') || bL.includes('online');
    if(aH && !bH) return -1; if(!aH && bH) return 1;
    return a.lang.localeCompare(b.lang);
  });

  filtered.forEach(v => {
    const btn = document.createElement('div');
    btn.className = 'v-btn' + (v.name === selectedVoiceName ? ' active' : '');
    let flag = v.lang.includes('US') ? '🇺🇸' : '🇬🇧';
    let cleanName = v.name.replace('Microsoft ', '').replace('Apple ', '').replace('(Premium)', '').split(' ')[0];
    btn.innerHTML = `<span>${cleanName}</span><span class="lang-tag">${flag}</span>`;
    btn.onclick = () => { selectedVoiceName = v.name; loadVoices(); };
    grid.appendChild(btn);
  });
  if(!selectedVoiceName && filtered.length > 0) selectedVoiceName = filtered[0].name;
}
window.speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 800);

function showTab(n) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(n+'-page').classList.add('active');
  const map = {text:0, dialog:1, player:2, settings:3};
  document.querySelectorAll('.tab')[map[n]].classList.add('active');
}

function loadFile(input, targetId) {
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = e => document.getElementById(targetId).value = e.target.result;
  reader.readAsText(file);
}

function setPauseMode(dyn) {
  isDynamic = dyn;
  document.getElementById('mode-dyn').classList.toggle('active', dyn);
  document.getElementById('mode-stat').classList.toggle('active', !dyn);
  document.getElementById('dyn-set').style.display = dyn ? 'block' : 'none';
  document.getElementById('stat-set').style.display = !dyn ? 'block' : 'none';
}

function toggleTransView(show) {
  document.getElementById('meaning-box').style.display = show ? 'flex' : 'none';
}

function restartFromZero() {
  window.speechSynthesis.cancel();
  currentIdx = 0; updateUI();
  if(isPlaying) startShadowing();
}

function replayCurrent() {
  window.speechSynthesis.cancel();
  if(isPlaying) startShadowing();
  else speakText(sentences[currentIdx].eng);
}

async function speakText(text) {
  return new Promise(res => {
    const u = new SpeechSynthesisUtterance(text);
    const vs = window.speechSynthesis.getVoices();
    // iPhone'da Siri veya Enhanced seslere öncelik ver
    let best = vs.find(v => v.name === selectedVoiceName) || 
               vs.find(v => v.name.includes('Siri') && v.lang.includes('en')) || 
               vs.find(v => v.name.includes('Enhanced') && v.lang.includes('en')) || vs[0];
    u.voice = best; u.rate = rate; u.volume = 1;
    u.onend = res; u.onerror = res;
    window.speechSynthesis.speak(u);
  });
}

function initApp(mode) {
  const raw = (mode==='normal'?document.getElementById('main-text'):document.getElementById('dialog-text')).value;
  if(!raw.trim()) return alert("Metin girin!");
  sentences = raw.split('\n').filter(l=>l.trim()).map((l, i) => {
    let parts = l.split('|');
    let eng = parts[0].trim(), tr = parts[1] ? parts[1].trim() : "";
    let speaker = null;
    if(mode === 'dialog') {
      const m = eng.match(/^([A-Z0-9]+)\s*:\s*(.+)$/i);
      if(m) { speaker = m[1].toUpperCase(); eng = m[2].trim(); }
      else { speaker = (i%2===0?'A':'B'); }
    }
    return { eng, tr, speaker };
  });
  currentIdx = 0; isPlaying = false;
  renderList(); showTab('player'); updateUI();
}

function renderList() {
  const cont = document.getElementById('list-container');
  cont.innerHTML = '';
  sentences.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'sent-item'; item.id = 'item-' + i;
    item.innerText = (s.speaker ? s.speaker+": " : "") + s.eng;
    item.onclick = () => { currentIdx = i; updateUI(); window.speechSynthesis.cancel(); };
    cont.appendChild(item);
  });
}

function updateUI() {
  document.querySelectorAll('.sent-item').forEach(el => el.classList.remove('active'));
  const active = document.getElementById('item-' + currentIdx);
  if(active) { active.classList.add('active'); active.scrollIntoView({behavior:'smooth', block:'center'}); }
  document.getElementById('display-text').innerText = sentences[currentIdx].eng;
  document.getElementById('meaning-box').innerText = sentences[currentIdx].tr || "...";
  document.getElementById('prog-fill').style.width = ((currentIdx+1)/sentences.length*100) + "%";
}

async function startShadowing() {
  while(currentIdx < sentences.length && isPlaying) {
    const s = sentences[currentIdx];
    const isMe = !s.speaker || s.speaker === myRole;
    updateUI();
    document.getElementById('display-text').className = "player-sentence " + (isMe ? "shadowing" : "listening");
    for(let r=0; r < (isMe ? repeatCount : 1); r++) {
      if(!isPlaying) break;
      setStatus('speaking', '🔊 Okunuyor...');
      await speakText(s.eng);
      if(isMe && isPlaying) {
        setStatus('repeat', '🎤 Sıra Sende!');
        let wait = isDynamic ? Math.max(2, s.eng.split(' ').length * dynMultiplier) : staticPause;
        while(wait > 0 && isPlaying) {
          document.getElementById('timer-display').innerText = wait.toFixed(1);
          await new Promise(res => setTimeout(res, 100));
          wait -= 0.1;
        }
        document.getElementById('timer-display').innerText = "";
      }
    }
    if(isPlaying) {
      currentIdx++;
      if(currentIdx >= sentences.length) { isPlaying = false; document.getElementById('play-btn').innerText = '▶'; setStatus('speaking', '✅ Bitti'); }
    }
  }
}

function setStatus(m, t) {
  const b = document.getElementById('status-box');
  b.className = 'status-pill status-' + m; b.innerText = t;
}
function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('play-btn').innerText = isPlaying ? '⏸' : '▶';
  if(isPlaying) { requestWakeLock(); startShadowing(); } else { if(wakeLock) wakeLock.release(); window.speechSynthesis.cancel(); }
}
function changeSentence(n) {
  window.speechSynthesis.cancel();
  currentIdx = Math.max(0, Math.min(sentences.length-1, currentIdx + n));
  updateUI(); if(isPlaying) startShadowing();
}
function setRole(r) {
  myRole = r;
  document.getElementById('role-a').classList.toggle('active', r === 'A');
  document.getElementById('role-b').classList.toggle('active', r === 'B');
}
</script>
</body>
</html>
